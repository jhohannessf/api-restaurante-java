spring:
  application:
    name: restaurante

  datasource:
    url: jdbc:postgresql://${DB_HOST}/restaurante
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true

    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
      

  threads:
    virtual:
      enabled: true

server:
  port: 8080

pagamento:
  api:
    url: http://localhost:9090